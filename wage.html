<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <link rel="icon" href="favicon.ico" sizes="48x48">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
        <title>Geometry Dash: Try Me!</title>

        <style>
            @font-face {font-family: "Aller"; src: url("assets/fonts/allersubset.woff2")}
            * {margin: 0; padding: 0}
            body {
                display: flex; overflow: hidden;
                background: linear-gradient(to bottom, rgba(0,101,253,0.75) 0%, rgba(0,46,115,0.75) 100%);
                background-color: black;
                background-size: cover;
            }
            canvas {display: block; margin: 0 auto}

            /*//////////////////////////////////////////////////////////////////////*/

            .dropoverlay {
                position: fixed;
                left: 50%; top: 50%; transform: translate(-50%, -50%);
                text-align: center; font-family: "Aller"; font-size: 2em;
                opacity: 0; z-index: 99999; border-radius: 1em;
                background: rgba(0,0,0,0.75);
                transition: opacity 0.22s ease-out;
                pointer-events: none;
                color: rgba(255, 255, 255, 0.95);
                width: calc(100% - 1em); max-width: 100vw;
                height: calc(100% - 1em); max-height: 100vh;
                display: flex; align-items: center;
                justify-content: center;
                user-select: none;
            }
            .dropoverlay.dropactive {opacity: 1; pointer-events: auto}
            .dropoverlay.clickable {cursor: pointer}

            /*//////////////////////////////////////////////////////////////////////*/

            .dropselectedge {
                position: fixed; z-index: 99998;
                pointer-events: none;
            }
            .dropselectedge.active {
                pointer-events: auto;
                background: rgba(0,0,0,0.1);
            }
            .dropselectedge.top, .dropselectedge.bottom,
            .dropselectedge.left, .dropselectedge.right {
                background: rgba(0,0,0,0.01);
                transition: background 0.15s;
            }
            .dropselectedge.top, .dropselectedge.bottom {
                left: 0; width: 100vw; height: 8vw; min-height: 32px; max-height: 54px;
            }
            .dropselectedge.top {top: 0}
            .dropselectedge.bottom {bottom: 0}
            .dropselectedge.left, .dropselectedge.right {
                top: 0; height: 100vh; width: 8vw; 
                min-width: 32px; max-width: 54px;
            }
            .dropselectedge.left {left: 0}
            .dropselectedge.right {right: 0}
            .dropselectgesture {
                position: fixed; left: 0; bottom: 0;
                width: 20px; height: 20px; z-index: 99996;
                pointer-events: auto; touch-action: none;
                background: transparent;
            }
            .dropselectgesture svg {
                display: block;
                width: 100%; height: 100%;
                pointer-events: none;
            }
        </style>
    </head>
    <body>
        <div class="dropoverlay" aria-hidden="true">
            <span>Drop here! (<a style="color:#40E348">.gmd</a>/<a style="color:#FF96FF">.mp3</a>)</span>
            <input type="file" class="fileinputnative" style="display:none" accept=".gmd,.mp3" multiple />
        </div>
        <div class="dropselectedge top"></div>
        <div class="dropselectedge bottom"></div>
        <div class="dropselectedge left"></div>
        <div class="dropselectedge right"></div>
        <div class="dropselectgesture">
            <svg viewBox="0 0 40 40">
                <polygon points="0,40 0,0 40,40" fill="rgba(0,0,0,0.25)" />
            </svg>
        </div>
        <script src="dist.js"></script>
        <script>
            (function () {

                const overlay = document.querySelector(".dropoverlay");
                const edges = Array.from(document.querySelectorAll('.dropselectedge'));
                const gesture = document.querySelector('.dropselectgesture');
                const fileinput = document.querySelector('.fileinputnative');
                let dragdepth = 0, menumode = null;
                let gestureactive = false, gesturestart = null;
                let ignorecanvasinput = false;

                function hasdrag(dt) {
                    return dt && dt.types && (dt.types.contains ? dt.types.contains("Files") : Array.prototype.indexOf.call(dt.types, "Files") >= 0);
                }
                function setedgesactive(active) {
                    edges.forEach(edge => edge.classList.toggle('active', active));
                }
                function showoverlay({mode, clickable}) {
                    menumode = mode;
                    overlay.classList.add("dropactive");
                    overlay.classList.toggle("clickable", !!clickable);
                    overlay.setAttribute("aria-hidden", "false");
                    setedgesactive(!!clickable);
                    ignorecanvasinput = true;
                }
                function hideoverlay() {
                    menumode = null;
                    overlay.classList.remove("dropactive", "clickable");
                    overlay.setAttribute("aria-hidden", "true");
                    setedgesactive(false);
                    ignorecanvasinput = false;
                }
                function suppresscanvasinputsandoverlay(e) {
                    if (ignorecanvasinput && e.target.tagName === "CANVAS") {
                        e.stopPropagation();
                        e.preventDefault();
                    }
                }
                ["pointerdown","pointerup","touchstart","touchend","mousedown","mouseup"].forEach(
                    event => window.addEventListener(event, suppresscanvasinputsandoverlay, true)
                );

                /*//////////////////////////////////////////////////////////////////////*/

                function lvldataextract(text) {
                    const t = text.trim();
                    const m = t.match(/<k>k4<\/k><s>([\s\S]*?)<\/s>/);
                    if (m) return m[1].replace(/\s+/g, "");
                    if (t.startsWith("H4sI")) return t.replace(/\s+/g, "");
                    return null;
                }
                function queuependingmp3(file) {
                    if (window.__custommusic) URL.revokeObjectURL(window.__custommusic);
                    window.__custommusic = URL.createObjectURL(file);
                }

                window.addEventListener("dragenter", function (e) {
                    if (!hasdrag(e.dataTransfer)) return;
                    dragdepth++;
                    showoverlay({mode: "drag", clickable: false});
                });
                window.addEventListener("dragleave", function (e) {
                    if (!hasdrag(e.dataTransfer)) return;
                    dragdepth = Math.max(0, dragdepth - 1);
                    if (!dragdepth) hideoverlay();
                });
                window.addEventListener("dragover", function (e) {
                    if (hasdrag(e.dataTransfer)) {
                        e.preventDefault();
                        e.dataTransfer.dropEffect = "copy";
                    }
                });
                window.addEventListener("drop", function (e) {
                    if (menumode !== "drag") return;
                    e.preventDefault();
                    dragdepth = 0;
                    hideoverlay();
                    const files = e.dataTransfer && e.dataTransfer.files;
                    if (!files || !files.length) return;
                    handlefilelist(files);
                });

                function handlefilelist(filelist) {
                    Array.from(filelist).forEach(file => {
                        const name = (file.name || "").toLowerCase();
                        if (name.endsWith(".gmd")) {
                            const reader = new FileReader();
                            reader.onload = function () {
                                const b64 = lvldataextract(String(reader.result || ""));
                                if (b64) window.__customlevel = b64;
                            };
                            reader.readAsText(file);
                        } else if (name.endsWith(".mp3")) {
                            queuependingmp3(file);
                        }
                    });
                }

                overlay.addEventListener("click", function (e) {
                    if (menumode === "select" && e.target.closest('.dropoverlay')) {
                        fileinput.value = "";
                        fileinput.click();
                    }
                });
                fileinput.addEventListener("change", function () {
                    if (menumode === "select" && fileinput.files && fileinput.files.length > 0) {
                        handlefilelist(fileinput.files);
                        hideoverlay();
                    }
                });

                edges.forEach(edge => {
                    ["click", "touchstart"].forEach(event => {
                        edge.addEventListener(event, function () {
                            if (menumode === "select") hideoverlay();
                        }, {passive:true});
                    });
                });

                gesture.addEventListener('pointerdown', function(e) {
                    if (menumode) return;
                    gestureactive = true;
                    const rect = gesture.getBoundingClientRect();
                    gesturestart = {
                        x: rect.left + rect.width / 2,
                        y: rect.top + rect.height / 2,
                        pointer: {x: e.clientX, y: e.clientY}
                    };
                });
                window.addEventListener('pointermove', function(e) {
                    if (!gestureactive || menumode) return;
                    const dx = e.clientX - gesturestart.pointer.x;
                    const dy = e.clientY - gesturestart.pointer.y;
                    const diag = Math.hypot(window.innerWidth, window.innerHeight);
                    if (dx > 0.18 * diag && dy < -0.18 * diag) {
                        gestureactive = false;
                        showoverlay({mode: "select", clickable: true});
                    }
                });
                window.addEventListener('pointerup', function(e) {
                    if (!gestureactive || menumode) return;
                    const {left, right, top, bottom} = gesture.getBoundingClientRect();
                    if (e.clientX >= left && e.clientX <= right && e.clientY >= top && e.clientY <= bottom) {
                        showoverlay({mode: "select", clickable: true});
                    }
                    gestureactive = false;
                });
                window.addEventListener("resize", function () {
                    gestureactive = false;
                    gesturestart = null;
                });

            })();

            /*//////////////////////////////////////////////////////////////////////*/

            new ResizeObserver(() => {
                window.dispatchEvent(new Event("resize"));
            }).observe(document.documentElement);

            
        </script>
    </body>
</html>
